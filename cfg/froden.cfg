echo "=== FRODEN CONFIG LOADED ==="

// Сенса
sensitivity 0.291
zoom_sensitivity_ratio 0.75

// DPI
echo "DPI: 1600"

// Бинды
bind "MWHEELUP" "+jump"
bind "MWHEELDOWN" "+jump"

// Прицел 
cl_crosshairsize 2
cl_crosshairthickness 0.5
cl_crosshaircolor 3
cl_crosshairgap -1
cl_crosshair_drawoutline 1
cl_crosshair_outlinethickness 1
cl_crosshairalpha 255
cl_crosshairdot 1